repos:
  # 说明：
  # - 使用本地 system hook，避免远端 hook 联网安装失败阻断提交
  # - 请先用当前解释器安装 requirements-dev.txt，再执行 `python -m pre_commit install`
  - repo: local
    hooks:
      - id: ruff
        name: ruff (system)
        entry: python -m ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python]
