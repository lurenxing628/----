{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h2>批量停机计划</h2>
    <p class="muted">
      为设备安排停机时间。可以按单台、按类别或全部设备设置。
      为兼容现有数据结构，系统会把范围展开为“按设备逐条写入 MachineDowntimes”。
    </p>
    <div style="margin-top:8px;">
      <a href="{{ url_for('equipment.list_page') }}">← 返回设备列表</a>
    </div>
  </div>

  <div class="card">
    <h3>创建停机区间</h3>
    <form method="post" action="{{ url_for('equipment.downtime_batch_create') }}">
      <div class="form-row">
        <div style="min-width:260px;">
          <label>范围</label><br/>
          <select name="scope_type" id="scopeType">
            <option value="machine">单台设备</option>
            <option value="category">设备类别</option>
            <option value="all">全部设备</option>
          </select>
        </div>
        <div id="scopeMachine" style="min-width:320px;">
          <label>选择设备</label><br/>
          <select name="scope_value" id="scopeValueMachine">
            {% for mid, label in machine_options %}
              <option value="{{ mid }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div id="scopeCategory" style="display:none; min-width:220px;">
          <label>选择类别</label><br/>
          <select name="scope_value" id="scopeValueCategory">
            {% if categories and categories|length > 0 %}
              {% for c in categories %}
                <option value="{{ c }}">{{ c }}</option>
              {% endfor %}
            {% else %}
              <option value="">（没有设备类别，需要先在设备详情中填写）</option>
            {% endif %}
          </select>
        </div>
        <div>
          <label>开始时间</label><br/>
          <input name="start_time" required placeholder="如：2026-01-22 08:00" style="min-width:220px;">
        </div>
        <div>
          <label>结束时间</label><br/>
          <input name="end_time" required placeholder="如：2026-01-22 12:00" style="min-width:220px;">
        </div>
        <div>
          <label>停机原因</label><br/>
          <select name="reason_code">
            {% for v, label in reason_options %}
              <option value="{{ v }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div style="flex:1; min-width:240px;">
          <label>原因备注（可选）</label><br/>
          <input name="reason_detail" placeholder="可选：更具体的停机原因说明">
        </div>
        <div>
          <button type="submit">创建</button>
        </div>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="muted">
      提示：创建后可到对应设备的详情页查看和管理停机记录。如需查看停机对排产的影响，请到报表中心的“停机影响统计”。
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/downtime_batch.js') }}" defer></script>
{% endblock %}
