{% extends "base.html" %}
{% import "components/ui_macros.html" as ui %}
{% block content %}
  <div class="card">
    <div class="page-header">
      <div class="page-title-group"><h2 class="page-title">工种详情</h2></div>
      <div class="page-actions page-actions-context"></div>
    </div>
    <p class="page-subtitle text-meta">工种ID：<strong>{{ op_type.op_type_id }}</strong>　工种名称：<strong>{{ op_type.name }}</strong></p>
    {{ ui.process_nav('op_types') }}
  </div>

  <div class="card">
    <h3>基本信息</h3>
    <form method="post" action="{{ url_for('process.update_op_type', op_type_id=op_type.op_type_id) }}">
      <div class="form-row">
        <div>
          <label>工种ID</label><br/>
          <input value="{{ op_type.op_type_id }}" disabled>
        </div>
        <div>
          <label>工种名称</label><br/>
          <input name="name" required value="{{ op_type.name }}">
        </div>
        <div>
          <label>归属</label><br/>
          <select name="category">
            <option value="internal" {% if op_type.category=='internal' %}selected{% endif %}>内部</option>
            <option value="external" {% if op_type.category=='external' %}selected{% endif %}>外部</option>
          </select>
        </div>
        <div class="flex-1 min-w-240">
          <label>备注</label><br/>
          <input name="remark" value="{{ op_type.remark or '' }}">
        </div>
        <div>{{ ui.button('保存', 'primary', 'md', type_attr='submit') }}</div>
      </div>
    </form>
  </div>
{% endblock %}
