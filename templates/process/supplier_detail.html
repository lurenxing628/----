{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h2>供应商详情</h2>
    <p class="muted">供应商ID：<strong>{{ supplier.supplier_id }}</strong>　名称：<strong>{{ supplier.name }}</strong></p>
    <div style="margin-top:8px;">
      <a href="{{ url_for('process.suppliers_page') }}">返回供应商列表</a>
      <span class="muted">｜</span>
      <a href="{{ url_for('process.list_parts') }}">返回工艺管理</a>
    </div>
  </div>

  <div class="card">
    <h3>基本信息</h3>
    <form method="post" action="{{ url_for('process.update_supplier', supplier_id=supplier.supplier_id) }}">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
        <div>
          <label>供应商ID</label><br/>
          <input value="{{ supplier.supplier_id }}" disabled>
        </div>
        <div>
          <label>名称</label><br/>
          <input name="name" required value="{{ supplier.name }}">
        </div>
        <div>
          <label>对应工种（可选）</label><br/>
          <select name="op_type_id">
            <option value="" {% if not supplier.op_type_id %}selected{% endif %}>（不绑定）</option>
            {% for v, label in op_type_options %}
              <option value="{{ v }}" {% if supplier.op_type_id == v %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label>默认周期（天）</label><br/>
          <input name="default_days" style="width:120px;" value="{{ supplier.default_days }}">
        </div>
        <div>
          <label>状态</label><br/>
          <select name="status">
            {% for v, label in status_options %}
              <option value="{{ v }}" {% if supplier.status == v %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div style="flex:1; min-width:240px;">
          <label>备注</label><br/>
          <input name="remark" value="{{ supplier.remark or '' }}">
        </div>
        <div>
          <button type="submit">保存</button>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
