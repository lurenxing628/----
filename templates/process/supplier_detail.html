{% extends "base.html" %}
{% import "components/ui_macros.html" as ui %}
{% block content %}
  <div class="card">
    <div class="page-header">
      <div class="page-title-group"><h2 class="page-title">供应商详情</h2></div>
      <div class="page-actions page-actions-context"></div>
    </div>
    <p class="page-subtitle text-meta">供应商ID：<strong>{{ supplier.supplier_id }}</strong>　名称：<strong>{{ supplier.name }}</strong></p>
    {{ ui.process_nav('suppliers') }}
  </div>

  <div class="card">
    <h3>基本信息</h3>
    <form method="post" action="{{ url_for('process.update_supplier', supplier_id=supplier.supplier_id) }}">
      <div class="form-row">
        <div>
          <label>供应商ID</label><br/>
          <input value="{{ supplier.supplier_id }}" disabled>
        </div>
        <div>
          <label>名称</label><br/>
          <input name="name" required value="{{ supplier.name }}">
        </div>
        <div>
          <label>对应工种（可选）</label><br/>
          <select name="op_type_id">
            <option value="" {% if not supplier.op_type_id %}selected{% endif %}>（不绑定）</option>
            {% for v, label in op_type_options %}
              <option value="{{ v }}" {% if supplier.op_type_id == v %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label>默认周期（天）</label><br/>
          <input name="default_days" class="w-120" value="{{ supplier.default_days }}">
        </div>
        <div>
          <label>状态</label><br/>
          <select name="status">
            {% for v, label in status_options %}
              <option value="{{ v }}" {% if supplier.status == v %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="flex-1 min-w-240">
          <label>备注</label><br/>
          <input name="remark" value="{{ supplier.remark or '' }}">
        </div>
        <div>{{ ui.button('保存', 'primary', 'md', type_attr='submit') }}</div>
      </div>
    </form>
  </div>
{% endblock %}
