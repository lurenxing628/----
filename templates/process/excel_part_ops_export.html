{% extends "base.html" %}
{% import "components/ui_macros.html" as ui %}
{% block content %}
  <div class="card">
    <div class="page-header">
      <div class="page-title-group"><h2 class="page-title">零件工序模板（Excel 导出）</h2></div>
      <div class="page-actions page-actions-context"></div>
    </div>
    <p class="page-subtitle text-meta">导出当前系统中的零件工序模板。外部工序在合并模式下会导出合计周期（天）。</p>
    {{ ui.process_nav('excel_part_ops') }}
    <div class="mt-2">
      {{ ui.link_button('导出（零件工序模板.xlsx）', export_url, 'secondary', 'md') }}
      <span class="muted">（导出会写入操作留痕）</span>
    </div>
  </div>
{% endblock %}
