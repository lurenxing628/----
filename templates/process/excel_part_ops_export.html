{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h2>零件工序模板（Excel 导出）</h2>
    <p class="muted">导出当前系统中的零件工序模板。外部工序在合并模式下会导出合计周期（天）。</p>
    <div style="margin-top:8px;">
      <a href="{{ export_url }}">导出（零件工序模板.xlsx）</a>
      <span class="muted">（导出会写入操作留痕）</span>
    </div>
    <div class="info-line" style="margin-top:8px;">
      <a href="{{ url_for('process.list_parts') }}">返回工艺管理</a>
      <span class="info-sep">|</span>
      <a href="{{ url_for('process.excel_routes_page') }}">导入零件工艺路线</a>
    </div>
  </div>
{% endblock %}
