<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "发生错误" }}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: #fffdf8;
      --border: #d8c7b0;
      --text: #1f2933;
      --muted: #5f6b76;
      --accent: #8c3d18;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(140, 61, 24, 0.08), transparent 36%),
        linear-gradient(180deg, #f8f2e8 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      max-width: 720px;
      margin: 64px auto;
      padding: 0 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(31, 41, 51, 0.08);
    }

    h2, h3 { margin-top: 0; }
    .error { color: var(--accent); }
    .muted { color: var(--muted); line-height: 1.7; }
    pre {
      margin: 0;
      padding: 14px;
      border-radius: 12px;
      background: #f7f8fa;
      border: 1px solid #e5e7eb;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
